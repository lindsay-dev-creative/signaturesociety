/* ============ COLOR SYSTEM ============ */
:root{
--blue100:#E7E7EC;--blue200:#CACBD5;--blue300:#A4A5B6;--blue400:#6A6D89;
--blue500:#0F1340;--blue600:#0D1036;--blue700:#0B0D2D;--blue800:#080A23;
--blue900:#06081A;--blue950:#040510;
--green100:#E7EAE8;--green200:#C9D2CD;--green300:#A2B0A9;--green400:#687F73;
--green500:#0B301D;--green600:#092919;--green700:#082214;--green800:#061A10;
--green900:#04130C;--green950:#030C07;
--red100:#ECE7E8;--red200:#D5CBCB;--red300:#B6A5A6;--red400:#886C6D;
--red500:#3F1214;--red600:#360F11;--red700:#2C0D0E;--red800:#230A0B;
--red900:#190708;--red950:#100505;
--orange100:#F5EDEA;--orange200:#E9D8D0;--orange300:#D9BCAE;--orange400:#C0927B;
--orange500:#9A4F2A;--orange600:#834324;--orange700:#6C371D;--orange800:#552B17;
--orange900:#3E2011;--orange950:#26140B;
--light100:#FCFCFB;--light200:#F8F8F6;--light300:#F4F2EF;--light400:#ECEAE4;
--light500:#E1DDD4;--light600:#BFBCB4;--light700:#9E9A94;--light800:#7C7975;
--light900:#5A5855;--light950:#383735;
/* phase accents */
--ph1:var(--blue500);--ph2:var(--green500);--ph3:var(--red500);
--ph4:var(--blue400);--ph5:var(--green400);--ph6:var(--red400);
--radius:10px;--radius-sm:6px;
--shadow:0 10px 40px rgba(0,0,0,.35);
}

/* ============ RESET / BASE ============ */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;
  font-weight:500;font-size:17px;line-height:1.5em;
  color:var(--light500);
  background:var(--blue950);
  padding-top:56px;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
html{background:var(--blue950)}
body-italic{
  font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;
  font-style:italic;
  font-weight:500;font-size:17px;line-height:1.5em;
  color:var(--light500);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
.prose{max-width:70ch}
a{color:var(--orange400)}
em,i{font-style:italic}
body-sm-italic{font-style:italic;font-size:14px;font-weight:500}
body-sm{font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;font-weight:500;font-size:14px;line-height:1.5;letter-spacing:.02em;color:var(--light500);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

/* ============ TYPOGRAPHY (PP Fragment Serif Light headers, uppercase) ============ */
h1,h2,h3,h4,h5,h6{
  font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;
  font-weight:400;line-height:1.25;color:var(--light200);text-transform:uppercase;
}
h1{font-size:clamp(1.9rem,4vw,2.9rem);letter-spacing:0em;}
h2{font-size:clamp(1.55rem,3vw,2.35rem);letter-spacing:0em;}
h3{font-size:clamp(1.3rem,2.4vw,1.95rem);letter-spacing:.02em;}
h4{font-size:clamp(1.15rem,1.9vw,1.6rem);letter-spacing:.02em;}
h5{font-size:clamp(1.02rem,1.5vw,1.38rem);letter-spacing:.04em;}
h6{font-size:clamp(.9rem,1.1vw,1.12rem);letter-spacing:.04em;}
upper-lg{font-size:17px;letter-spacing:.04em;text-transform:uppercase;font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;font-weight:500;color:var(--light700)}
upper-md{font-size:15px;letter-spacing:.06em;text-transform:uppercase;font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;font-weight:500;color:var(--light700)}
upper-sm{font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;font-weight:500;color:var(--light700)}

/* ============ BUTTONS ============ */
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.btn-primary,.btn-secondary{
  font-weight:500;font-size:13px;letter-spacing:.08em;
  padding:.72em 1.4em;border-radius:0;transition:background .15s,border-color .15s,color .15s,transform .05s;
  display:inline-flex;align-items:center;gap:.5em;
}
/* Primary */
.btn-primary{background:var(--orange500);color:var(--light100)}
.btn-primary:hover{background:var(--orange600)}
.btn-primary:active{background:var(--orange700);transform:translateY(1px)}
.btn-primary.on-light{background:var(--blue500);color:var(--light100)}
.btn-primary.on-light:hover{background:var(--blue600)}
.btn-primary.on-light:active{background:var(--blue700)}
/* Secondary */
.btn-secondary{background:transparent;color:var(--light500);border:1px solid var(--light800)}
.btn-secondary:hover{background:rgba(255,255,255,.05);border-color:var(--light600);color:var(--light300)}
.btn-secondary:active{background:rgba(255,255,255,.09);transform:translateY(1px)}
.btn-secondary.on-light{color:var(--blue700);border-color:var(--light600)}
.btn-secondary.on-light:hover{background:var(--light300);border-color:var(--blue400)}
.btn-secondary.on-light:active{background:var(--light400)}
/* Inline buttons: medium 1rem / small 14px, dark + light bg variants */
.btn-inline{border-radius:0;font-weight:500;letter-spacing:.12em;transition:background .12s,color .12s,transform .05s;display:inline-flex;align-items:center;gap:.4em;line-height:1}
.btn-inline.md{font-size:13px;padding:.5em .85em}
.btn-inline.sm{font-size:13px;padding:.45em .7em}
/* on dark backgrounds */
.btn-inline.on-dark{color:var(--light400);background:rgba(255,255,255,.04)}
.btn-inline.on-dark:hover{background:rgba(255,255,255,.10);color:var(--light100)}
.btn-inline.on-dark:active{background:rgba(255,255,255,.16);transform:translateY(1px)}
.btn-inline.on-dark.active{background:var(--orange500);color:var(--light100)}
/* on light backgrounds */
.btn-inline.on-light{color:var(--blue700);background:rgba(15,19,64,.05)}
.btn-inline.on-light:hover{background:rgba(15,19,64,.11);color:var(--blue500)}
.btn-inline.on-light:active{background:rgba(15,19,64,.16);transform:translateY(1px)}
.btn-inline.on-light.active{background:var(--blue500);color:var(--light100)}
/* Uppercase, 13px, weight 500 across all buttons */
button{text-transform:uppercase;font-size:13px;font-weight:500;letter-spacing:.12em}
.btn-primary,.btn-secondary,.btn-inline,.btn-inline.md,.btn-inline.sm,.segmented button{font-size:13px;font-weight:500;text-transform:uppercase}
/* Calendar views: MONTH WEEK TIMELINE */
.segmented{display:inline-flex;background:rgba(255,255,255,.05);border-radius:0;padding:3px}
.segmented button{padding:.5em 1.1em;border-radius:0;font-size:13px;font-weight:500;letter-spacing:.12em;color:var(--light600)}
.segmented button.active{background:var(--orange500);color:var(--light100)}
.segmented button[data-view="week"]{display:none}

/* ============ LAYOUT ============ */
.wrap{max-width:1440px;margin:0 auto;padding-left:40px;padding-right:40px}
.brand-logo{height:clamp(64px,7vw,112px);width:auto;max-width:100%;display:block;padding-right:24px;border-right:1px solid var(--light950)}
header.masthead{margin-bottom:26px;border-bottom:1px solid var(--blue800);padding-bottom:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:nowrap}
.masthead-brand{display:flex;flex-direction:row;align-items:center;}
.brand-text{display:flex;flex-direction:column;gap:2px;padding-left:24px;}
.brand-text body-italic{display:block}
.masthead-copy{display:flex;flex-direction:column;align-items:center;gap:16px;margin-left:auto}
header.masthead{text-align:left;margin:0;padding-bottom:40px;}
.subtitle{color:var(--light700);margin-top:4px}

/* Top control bar */
.topbar{display:flex;flex-wrap:wrap;gap:18px 28px;align-items:flex-end;margin:22px 0 20px}
.field{display:flex;flex-direction:column;gap:6px}
.field>label{font-family:"Cormorant Garamond Variable",Georgia,serif;font-size:13px;letter-spacing:.6px;line-height:18px;text-transform:uppercase;color:var(--light700);font-weight:400}
input[type=date],input[type=text],input[type=number],input[type=url],textarea{
  font-family:inherit;font-size:1rem;color:var(--blue700);background:var(--light100);
  border:1px solid var(--light600);border-radius:0;padding:.55em .7em;
}
input[type=date]{color-scheme:light;border-radius:0}
.launch-card{margin-left:0;text-align:left;background:var(--orange600);padding:16px 22px;border-radius:0;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:flex-start;min-width:320px}
.launch-card upper-sm,.launch-card .lc-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--orange100);font-weight:500}
.launch-card .lc-date{font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;font-weight:400;font-size:clamp(1.6rem,3.2vw,2.5rem);letter-spacing:.01em;color:var(--light100);line-height:1.4em;margin-top:0}
.launch-card .lc-sub{font-size:13px;color:var(--orange300);margin-top:2px;opacity:.95}
.launch-card .lc-row{display:flex;flex-direction:column;gap:4px;}
.launch-card .lc-row-sub{margin-top:2px}
.launch-card .lc-date-sm{font-size:clamp(1.2rem,2.4vw,1.7rem)}

/* View controls row */
.viewbar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin:8px 0 16px}
.navgroup{display:inline-flex;gap:8px;align-items:center}
.period-title{font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;font-weight:400;font-size:clamp(1rem,1.4vw,1.438rem);letter-spacing:.01em;color:var(--light200);min-width:180px;text-align:center}
.spacer{flex:1}

/* ============ CALENDAR (light surface) ============ */
.calendar{background:var(--light100);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);color:var(--blue700);overflow:hidden}
.dow{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px}
.dow div{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--light800);font-weight:500;text-align:center;padding:4px 0}
.month-grid{display:flex;flex-direction:column;gap:6px}
.week-row{border:1px solid var(--light400);border-radius:var(--radius-sm);overflow:hidden;background:#FAFAFA}
.week-dates{display:grid;grid-template-columns:repeat(5,1fr)}
.week-dates .daycell{padding:5px 7px;font-size:12px;min-height:26px;border-right:1px solid var(--light400);color:var(--light800)}
.week-dates .daycell:last-child{border-right:none}
.week-dates .daycell.other{color:var(--light600);background:var(--light300)}
.week-dates .daycell.weekend{background:var(--light300)}
.week-dates .daycell.today{color:var(--orange600);font-weight:400}
.week-dates .daycell.today .dnum{background:var(--orange500);color:#fff;border-radius:0;padding:4px}
.week-bars{display:grid;grid-template-columns:repeat(5,1fr);gap:3px 0;padding:4px 4px 8px}
.bar{grid-row:auto;margin:1px 2px;height:22px;border-radius:4px;font-size:11.5px;line-height:22px;color:var(--light100);
  padding:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:400;
  transition:filter .12s,transform .05s;position:relative}
.bar:hover{filter:brightness(1.12);transform:translateY(-1px)}
.bar.p1{background:var(--ph1)}.bar.p2{background:var(--ph2)}.bar.p3{background:var(--ph3)}
.bar.p4{background:var(--ph4)}.bar.p5{background:var(--ph5)}.bar.p6{background:var(--ph6)}
.bar.contin-l{border-top-left-radius:0;border-bottom-left-radius:0}
.bar.contin-r{border-top-right-radius:0;border-bottom-right-radius:0}
/* milestone marker */
.bar.milestone{background:var(--orange500);color:var(--light100);font-weight:500;font-size:14px;box-shadow:0 0 0 2px var(--light100),0 0 0 3px var(--orange500)}
.bar.milestone::before{content:"\2666";margin-right:5px}
/* check-in pill (outlined) */
.bar.checkin{background:transparent;color:var(--orange600);border:1.5px solid var(--orange500);line-height:19px;font-size:11px;font-weight:500}
.bar.checkin::before{content:"\25CB";margin-right:4px}
/* task-type colors (shared across month bars, week items, and gantt bars) */
.bar.buildtask,.wv-item.buildtask,.gbar.buildtask{background:#E1DDD4}
.bar.buildtask{font-size:13px;font-weight:500;padding:8px;color:var(--blue700)}
/* auto-fit heights inside the calendar area so padded bars aren't clipped; keep gantt bars fixed */
#calArea,#calArea div{height:auto}
#calArea .gbar{height:16px}
#calArea{background:#FDFDFC}
.bar.clienttask,.wv-item.clienttask,.gbar.clienttask{background:var(--blue500)}
/* hard-date deadline marker (gold accent, flag glyph) */
.bar.harddate,.wv-item.harddate,.gbar.harddate{background:var(--orange600)}
.bar.harddate,.wv-item.harddate{color:var(--light100);font-weight:500}
.bar.harddate::before{content:"\2691";margin-right:5px}
.wv-item.harddate .wi-name::before{content:"\2691  "}
.gbar.harddate{font-weight:400;min-width:16px}

/* ============ WEEK VIEW ============ */
.week-view{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.wv-col{background:var(--light200);border:1px solid var(--light400);border-radius:var(--radius-sm);min-height:200px;display:flex;flex-direction:column}
.wv-col.weekend{background:var(--light300)}
.wv-head{padding:8px;border-bottom:1px solid var(--light400);text-align:center}
.wv-head .d1{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--light800)}
.wv-head .d2{font-family:"Cormorant Garamond Variable",Georgia,serif;font-size:1.2rem;color:var(--blue700)}
.wv-head.today .d2{color:var(--orange600)}
.wv-body{padding:6px;display:flex;flex-direction:column;gap:6px}
.wv-item{border-radius:var(--radius-sm);padding:7px 9px;color:var(--light100);cursor:pointer;transition:filter .12s}
.wv-item:hover{filter:brightness(1.1)}
.wv-item.p1{background:var(--ph1)}.wv-item.p2{background:var(--ph2)}.wv-item.p3{background:var(--ph3)}
.wv-item.p4{background:var(--ph4)}.wv-item.p5{background:var(--ph5)}.wv-item.p6{background:var(--ph6)}
.wv-item .wi-name{font-weight:400;font-size:13px;line-height:1.25}
.wv-item .wi-meta{font-size:11px;opacity:.85;margin-top:3px}
.wv-item .wi-desc{font-size:11px;opacity:.8;margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wv-item.milestone{background:var(--orange500)}
.wv-item.milestone .wi-name::before{content:"\2666  "}
.wv-item.checkin{background:transparent;border:1.5px solid var(--orange500);color:var(--orange700)}
.wv-item.checkin .wi-name::before{content:"\25CB  "}
/* uniform week bars: light fill + subtle stroke (overrides type colors) */
.week-bars .bar,.week-view .wv-item{background:#FAFAFA;border:1px solid #d4d4d8;color:var(--blue700);box-shadow:none}
.week-bars .bar.buildtask,.week-view .wv-item.buildtask{background:#E1DDD4}
.week-bars .bar{line-height:20px}

/* ============ AGENDA (mobile month) ============ */
.agenda{display:flex;flex-direction:column;gap:2px}
.agenda-day{display:grid;grid-template-columns:64px 1fr;gap:10px;padding:8px 4px;border-bottom:1px solid var(--light400)}
.agenda-date{font-size:13px;color:var(--light800);font-weight:400;padding-top:3px}
.agenda-date .ad-day{font-family:"Cormorant Garamond Variable",Georgia,"Times New Roman",serif;font-weight:400;font-size:clamp(1rem,1.4vw,1.438rem);letter-spacing:.01em;color:var(--blue700);display:block}
.agenda-items{display:flex;flex-direction:column;gap:5px}

/* ============ GANTT / OVERVIEW (Jul–Nov) ============ */
.gantt{--glabel:420px;padding:0}
.gantt-scroll{overflow-x:auto}
.gantt-inner{min-width:960px;position:relative}
.gantt-head{display:flex;align-items:stretch;border-bottom:1px solid var(--light400);position:sticky;top:0;background:var(--light100);z-index:3}
.gantt-label-col{flex:0 0 var(--glabel);width:var(--glabel);padding:9px 14px;font-size:12px;color:var(--light800);border-right:1px solid var(--light400);box-sizing:border-box}
.gantt-track{position:relative;flex:1 1 auto;min-height:26px;align-items:center;display:flex}
.gantt-months{display:flex}
.gantt-months .gmonth{border-right:1px solid var(--light400);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--light800);font-weight:400;padding:9px 8px;box-sizing:border-box;overflow:hidden}
.gantt-months .gmonth:last-child{border-right:none}
.gantt-phase{display:flex;background:var(--light300);border-bottom:1px solid var(--light400)}
.gantt-phase .gantt-label-col{font-family:"Cormorant Garamond Variable",Georgia,serif;font-size:13px;color:var(--blue700);font-weight:400;padding-top:7px;padding-bottom:7px}
.gantt-row{display:flex;align-items:stretch;border-bottom:1px solid var(--light300)}
.gantt-row:hover{background:var(--light200)}
.gantt-row .gantt-label-col{font-size:12.5px;color:var(--blue700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-top:7px;padding-bottom:7px;cursor:pointer}
.gantt-row .gantt-track{padding:5px 0}
.gbar{position:absolute;top:5px;height:16px;border-radius:3px;color:var(--light100);font-size:10.5px;line-height:16px;padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.15);box-sizing:border-box}
.gbar.buildtask{box-shadow:none}
.gbar:hover{filter:brightness(1.1)}
.gbar.p1{background:var(--ph1)}.gbar.p2{background:var(--ph2)}.gbar.p3{background:var(--ph3)}
.gbar.p4{background:var(--ph4)}.gbar.p5{background:var(--ph5)}.gbar.p6{background:var(--ph6)}
.gbar.milestone{background:var(--orange500);font-weight:400;min-width:16px}
.gantt-overlay{position:absolute;top:0;bottom:0;width:1px;background:var(--light400);pointer-events:none;z-index:1}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--orange500);opacity:.75;pointer-events:none;z-index:2}
.gantt-today::before{content:"Today";position:absolute;top:3px;left:4px;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--orange600);white-space:nowrap;font-weight:400}
.gantt-empty{padding:16px;color:var(--light800);font-size:13px}

/* ============ LIST VIEW ============ */
.listview{margin-top:30px}
.listview-head{display:flex;align-items:center;gap:12px;user-select:none;padding:10px 0;border-bottom:1px solid var(--blue800)}
.listview-head h3{color:var(--light300)}
.list-body{margin-top:16px}
/* Resources & Links card */
.resources-card{margin:8px 0 4px auto;min-width:316px;gap:8px;}
.resources-card ul{list-style:none;display:flex;flex-direction:column;}
.resources-card li a{display:inline-flex;align-items:center;gap:8px;color:var(--orange400);text-decoration:none;font-size:16px}
.resources-card li a:hover{color:var(--orange300);text-decoration:underline}
.resources-card li a::before{content:"\2197";color:var(--orange400)}
.tbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.tbl th{text-align:left;font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--light700);padding:6px 20px;border-bottom:1px solid var(--blue800)}
.tbl td{padding:9px 20px;border-bottom:1px solid var(--blue900);vertical-align:top;color:var(--light500);word-wrap:break-word;overflow-wrap:break-word}
.tbl tr{cursor:pointer;transition:background .12s}
.tbl tr:hover td{background:rgba(255,255,255,.03)}
.tbl .c-phase{font-weight:400;color:var(--light300);white-space:normal;font-size:16px}
.tbl .c-detail .d-desc{color:var(--light700);font-size:16px;margin-top:2px;line-height:1.5}
/* Hidden columns: Detail, Comment, Complete, Delete */
.tbl .c-detail,.tbl .c-comment,.tbl .c-complete,.tbl .c-delete{display:none}
.tbl .c-date,.tbl .c-dur{white-space:nowrap;color:var(--light600);font-size:15px}
.tbl .c-comment,.tbl .c-complete{text-align:center;white-space:nowrap}
/* completed row -> strike through all text */
.tbl tr.completed td{text-decoration:line-through;color:var(--light700)}
.tbl tr.completed .d-desc{color:var(--light800)}
.tbl tr.completed .comment-btn,.tbl tr.completed .row-complete{text-decoration:none}
/* complete checkbox */
.row-complete{width:18px;height:18px;cursor:pointer;accent-color:var(--orange500);margin:0;vertical-align:middle}
/* comment icon button */
.comment-btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--blue700);color:var(--light500);padding:4px 7px;cursor:pointer;line-height:1;text-transform:none;font-size:13px;font-weight:400}
.comment-btn:hover{background:rgba(255,255,255,.12);color:var(--light100)}
.comment-btn svg{width:14px;height:14px;display:block}
/* delete (trash) button */
.tbl .c-delete{text-align:center;white-space:nowrap}
.delete-btn{display:inline-flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--red300);padding:4px 7px;cursor:pointer;line-height:1;text-transform:none}
.delete-btn:hover{background:transparent;border:none;color:var(--light200)}
.delete-btn svg{width:14px;height:14px;display:block}
.tbl tr.completed .delete-btn{text-decoration:none}
/* danger button in drawer */
.btn-danger{background:transparent;color:var(--red300);border:1px solid var(--red400);font-weight:500;font-size:13px;letter-spacing:.12em;padding:.72em 1.4em;border-radius:0;display:inline-flex;align-items:center;gap:.5em;text-transform:uppercase;transition:background .15s,color .15s}
.btn-danger:hover{background:var(--red500);color:var(--light100)}
.btn-danger svg{width:15px;height:15px}
.tag-ms{display:inline-block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--orange400);font-weight:500;border:1px solid var(--orange500);border-radius:20px;padding:1px 7px;margin-left:6px;vertical-align:middle}
.tag-fixed{display:inline-block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--light700);font-weight:500;border:1px solid var(--light800);border-radius:20px;padding:1px 7px;margin-left:6px;vertical-align:middle}

/* ============ EDIT DRAWER ============ */
.scrim{position:fixed;inset:0;background:rgba(4,5,16,.55);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(420px,92vw);background:var(--blue900);border-left:1px solid var(--blue700);
  box-shadow:var(--shadow);transform:translateX(100%);transition:transform .25s ease;z-index:50;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:20px 22px 14px;border-bottom:1px solid var(--blue800);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.drawer-head .dh-phase{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--orange400);font-weight:500}
.drawer-close{font-size:20px;color:var(--light600);line-height:1;padding:4px 8px;border-radius:0}
.drawer-close:hover{background:rgba(255,255,255,.08);color:var(--light200)}
.drawer-body{padding:20px 22px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}
.drawer-body .field{gap:7px}
.drawer-body textarea{min-height:110px;resize:vertical;line-height:1.5}
.drawer-meta{font-size:13px;color:var(--light700);background:rgba(255,255,255,.03);border-radius:var(--radius-sm);padding:12px 14px;line-height:1.7}
.drawer-meta b{color:var(--light400);font-weight:400}
.drawer-foot{padding:16px 22px;border-top:1px solid var(--blue800);display:flex;gap:10px}
.readonly-note{font-size:13px;color:var(--light700);font-style:italic}
/* comments in drawer */
.comments-wrap{display:flex;flex-direction:column;gap:10px}
.comments-list{display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto}
.comment-item{background:rgba(255,255,255,.03);border-left:2px solid var(--orange500);padding:8px 10px}
.comment-item .cm-head{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:var(--light700);margin-bottom:3px}
.comment-item .cm-author{color:var(--orange400);font-weight:400}
.comment-item .cm-text{font-size:13px;color:var(--light400);line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
.comments-empty{font-size:13px;color:var(--light800);font-style:italic}
.comment-add textarea{min-height:64px;width:100%}
.comment-add .ca-row{display:flex;gap:8px;margin-bottom:8px;align-items:stretch}
.comment-add .ca-row input,.comment-add .ca-row select{flex:1 1 42%;min-width:0}
.comment-add .ca-row button{white-space:nowrap}
.ca-author{font-family:inherit;font-size:1rem;color:var(--blue700);background:var(--light100);border:1px solid var(--light600);border-radius:0;padding:.55em .7em}
.name-select{cursor:pointer}
/* For review file section */
.review-wrap{display:flex;flex-direction:column;gap:10px}
.review-list{display:flex;flex-direction:column;gap:8px;max-height:440px;overflow-y:auto}
.review-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);border-left:2px solid var(--orange500);padding:8px 10px}
.review-item .review-name{flex:1 1 auto;min-width:0;color:var(--orange400);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.review-item .review-name:hover{text-decoration:underline}
.review-item .review-meta{flex:0 0 auto;font-size:11px;color:var(--light800);white-space:nowrap}
.review-item .review-del{flex:0 0 auto;background:transparent;border:none;color:var(--light700);font-size:18px;line-height:1;padding:0 2px;cursor:pointer}
.review-item .review-del:hover{color:var(--red300)}
.review-empty{font-size:13px;color:var(--light800);font-style:italic}
/* per-file comment thread */
.review-file{display:flex;flex-direction:column}
.review-file.open .review-item{border-left-color:var(--orange400)}
.review-file.open .review-item .review-del{display:none}
.review-item .review-cmt{flex:0 0 auto;display:inline-flex;align-items:center;gap:4px;background:transparent;border:none;color:var(--light700);padding:2px 4px;line-height:1;cursor:pointer;text-transform:none}
.review-item .review-cmt:hover,.review-item .review-cmt.on{color:var(--orange400)}
.review-item .review-cmt svg{width:14px;height:14px;display:block}
.review-item .rc-count{font-size:11px;letter-spacing:.04em;color:inherit}
.review-item .rc-close{font-size:18px;line-height:14px;display:block;padding:0 1px}
.review-comments{display:flex;flex-direction:column;gap:8px;margin:0 0 4px 10px;padding:10px 0 10px 12px;border-left:1px solid var(--blue800)}
.review-comments .comment-item{border-left-color:var(--light800)}
.review-comments .ca-row{margin-bottom:6px}
.review-comments textarea{min-height:60px;width:100%}
.review-add{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.review-file-input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;clip:rect(0 0 0 0)}
/* URL field */
.review-url{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.review-url>label{font-family:"Cormorant Garamond Variable",Georgia,serif;font-size:13px;letter-spacing:.6px;text-transform:uppercase;color:var(--light700);font-weight:400}
.review-url .ru-row{display:flex;gap:8px;align-items:stretch}
.review-url .ru-row input{flex:1 1 auto;min-width:0}
.review-url .ru-row button{white-space:nowrap}
.review-links{display:flex;flex-direction:column;gap:8px}
.review-links:not(:empty){margin-top:2px}
.review-upload-btn{cursor:pointer}
.tbl .row-assignee{width:100%;max-width:100%;box-sizing:border-box;border:1px solid var(--light600);border-radius:0}
.tbl .row-assignee>summary{list-style:none;cursor:pointer;padding:5px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--blue700);font-size:14px}
.tbl .row-assignee>summary::-webkit-details-marker{display:none}
.tbl .row-assignee .ra-placeholder{color:var(--light800)}
.tbl .row-assignee .ra-panel{padding:6px;border-top:1px solid var(--light400);display:flex;flex-direction:column;gap:5px;background:var(--light100)}
.tbl .row-assignee .ra-opt{display:flex;align-items:center;gap:6px;color:var(--blue700);cursor:pointer;text-transform:none;letter-spacing:normal;font-size:14px}
.tbl .row-assignee .ra-opt input{accent-color:var(--orange500);margin:0;width:15px;height:15px}
.tbl .row-assignee .ra-add{align-self:flex-start;margin-top:2px;background:rgba(15,19,64,.06);color:var(--blue700);border:none;padding:4px 8px;font-size:12px;text-transform:none;letter-spacing:normal;cursor:pointer;border-radius:3px}
.name-select option,.ca-author option{font-size:14px}

/* ============ MESSAGE BOARD ============ */
.board-open{align-self:flex-start;margin-bottom:2px}
.board-modal{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.98);
  width:90vw;height:90vh;max-width:90vw;max-height:90vh;
  background:var(--blue900);border:1px solid var(--blue700);box-shadow:var(--shadow);
  z-index:60;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;
}
.board-modal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.board-head{flex:0 0 auto;padding:18px 22px 14px;border-bottom:1px solid var(--blue800);display:flex;justify-content:space-between;align-items:center;gap:12px}
.board-head h4{margin:0;color:var(--light300)}
.board-list{flex:1 1 auto;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px}
.board-empty{font-size:14px;color:var(--light800);font-style:italic}
.board-msg{background:rgba(255,255,255,.03);border-left:2px solid var(--orange500);padding:12px 14px}
.board-msg .bm-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:5px}
.board-msg .bm-author{color:var(--orange400);font-weight:400;font-size:14px}
.board-msg .bm-when{font-size:12px;color:var(--light700)}
.board-msg .bm-edited{font-size:11px;color:var(--light800);font-style:italic;margin-left:6px}
.board-msg .bm-text{font-size:15px;color:var(--light400);line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
.board-msg .bm-actions{display:flex;gap:6px;margin-top:8px}
.board-msg .bm-act{background:transparent;border:none;color:var(--light700);font-size:11px;letter-spacing:.12em;padding:2px 0;margin-right:12px;cursor:pointer}
.board-msg .bm-act:hover{color:var(--light200)}
.board-msg .bm-act.del:hover{color:var(--red300)}
.board-msg .bm-edit{display:flex;flex-direction:column;gap:8px}
.board-msg .bm-edit textarea{width:100%;min-height:80px}
.board-foot{flex:0 0 auto;padding:14px 22px 18px;border-top:1px solid var(--blue800);display:flex;flex-direction:column;gap:8px}
.board-foot .ca-row{display:flex;gap:8px;align-items:stretch}
.board-foot .ca-row select{flex:0 1 260px;min-width:0}
.board-foot textarea{width:100%;min-height:78px;resize:vertical}

/* ============ RESPONSIVE ============ */
.only-mobile{display:none}
@media (max-width:900px){
  header.masthead{flex-direction:column;align-items:flex-start;gap:12px}
  .launch-card{margin-left:0;width:100%;text-align:left;min-width:0}
  .masthead-copy{align-items:flex-start;width:100%}
  .masthead-copy .launch-card,.masthead-copy .resources-card{align-self:flex-start}
  .tbl .c-detail{max-width:none}
}
@media (max-width:768px){
  .drawer{width:100vw}
  .launch-card{width:100%;min-width:0}
  .gantt{--glabel:150px}
}
@media (max-width:700px){
  body{line-height:1.7;padding:16px;padding-top:28px;overflow-x:hidden}
  .wrap{padding-left:0;padding-right:0}
  /* Header */
  header.masthead{flex-direction:column;align-items:stretch;gap:16px;padding-bottom:22px}
  .masthead-brand{gap:0;align-items:center}
  header.masthead h5{text-align:left;font-size:clamp(1rem,4.6vw,1.25rem)}
  .brand-logo{height:58px;padding-right:16px;margin-bottom:0}
  .brand-text{padding-left:16px;gap:3px}
  .brand-text body-italic{font-size:15px;color:var(--light600)}
  .masthead-copy{width:100%;gap:12px}
  .launch-card{width:100%;min-width:0;padding:18px 20px 16px}
  .launch-card .lc-row{gap:2px}
  .resources-card{min-width:0;width:100%;margin:16px 0 0;padding-top:14px;border-top:1px solid rgba(255,255,255,.22)}
  .resources-card ul{gap:2px}
  .resources-card li a{font-size:15px;min-height:38px;padding:2px 0}

  /* View switch + navigation: full width, easy to tap */
  .viewbar{gap:10px;margin:4px 0 14px}
  .segmented{display:flex;width:100%;padding:3px}
  .segmented button{flex:1;padding:0 .3em;min-height:42px;letter-spacing:.05em}
  .navgroup{flex:1 1 auto;justify-content:space-between;gap:6px}
  .period-title{flex:1;min-width:0;font-size:1.05rem}
  .viewbar .btn-inline.sm{min-height:40px;min-width:40px;justify-content:center;padding:.45em .8em}
  .spacer{display:none}

  /* Calendar */
  .desktop-cal{display:none}
  .only-mobile{display:block}
  .calendar{padding:8px 10px 10px;border-radius:12px}
  .week-view{grid-template-columns:1fr;gap:10px}
  .wv-col{min-height:0}
  .wv-head{display:flex;align-items:baseline;gap:8px;text-align:left;padding:8px 10px}
  .wv-head .d2{font-size:1.05rem}
  .wv-body{padding:8px;gap:8px}
  .wv-item{padding:10px 12px}
  .wv-item .wi-name{font-size:14px;line-height:1.35}
  .drawer{width:100vw;height:100%;border-left:none}
  /* Agenda (mobile month view) */
  .agenda-day{grid-template-columns:52px 1fr;gap:12px;padding:12px 2px}
  .agenda-date{font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .agenda-date .ad-day{font-size:1.5rem;line-height:1.1}
  .agenda-items{gap:8px;padding-right:3px}
  .agenda-items .bar{font-size:14px;line-height:1.4;border-radius:8px;margin:0}
  /* Gantt: keep labels readable, let the track scroll */
  .gantt{--glabel:132px}
  .gantt-inner{min-width:760px}

  /* Full Schedule -> stacked cards */
  .listview{margin-top:26px}
  .tbl{display:block}
  .tbl thead{display:none}
  .tbl tbody{display:block}
  .tbl tr{display:block;border:1px solid var(--blue800);border-radius:12px;padding:16px;margin-bottom:12px;background:rgba(255,255,255,.025)}
  .tbl tr:hover td{background:transparent}
  .tbl td{display:block;width:100%;border:none;padding:0}
  .tbl .c-phase{font-size:17px;line-height:1.35;color:var(--light200);margin-bottom:12px}
  .tbl .c-assignee.hide-sm{display:block;margin-bottom:12px}
  .tbl .row-assignee{display:inline-block;width:auto;max-width:100%;border-radius:999px;border-color:transparent}
  .tbl .row-assignee[open]{border-radius:14px}
  .tbl .row-assignee>summary{padding:5px 14px;font-size:13px;letter-spacing:.02em}
  .tbl .c-date,.tbl .c-date.hide-sm{display:inline-block;width:auto;color:var(--light400);font-size:14px;white-space:nowrap;margin:0 22px 0 0}
  .tbl .c-date.hide-sm::before{content:"START ";color:var(--light700);font-size:10px;letter-spacing:.12em}
  .tbl .c-date:not(.hide-sm)::before{content:"DUE ";color:var(--light700);font-size:10px;letter-spacing:.12em}

  .topbar{gap:14px}
  .field{width:100%}
  input[type=date]{width:100%}

  /* Message board */
  .board-open{width:100%;justify-content:center;min-height:42px}
  .board-head{padding:14px 16px 12px}
  .board-list{padding:14px 16px;gap:10px}
  .board-foot{padding:12px 16px 16px}
  .board-foot .ca-row{flex-wrap:wrap}
  .board-foot .ca-row select{flex:1 1 100%}
  .board-foot .ca-row button{flex:1 1 100%;justify-content:center;min-height:40px}
  .board-msg .bm-text{font-size:15px}
}

/* ============ PP FRAGMENT TYPE REFINEMENTS ============ */
/* Serif display accents inherit the header treatment: Light weight, uppercase */
.launch-card .lc-date,.period-title,.wv-head .d2,.agenda-date .ad-day,.gantt-phase .gantt-label-col{
  font-weight:300;text-transform:uppercase;letter-spacing:.03em;
}
/* Only the Light face is loaded; render UI labels with its glyphs (no faux weight) */
upper-lg,upper-md,upper-sm{font-weight:400}
/* Tablet: ease caps tracking so uppercase headings don't crowd */
@media (max-width:768px){
  h1,h2,h3,h4,h5,h6{letter-spacing:.035em}
}
/* Tablet: narrower date columns, roomier assignee column */
@media (min-width:701px) and (max-width:1024px){
  .tbl th:nth-child(3){width:210px !important}
  .tbl th:nth-child(4),.tbl th:nth-child(5){width:66px !important}
  .tbl .c-date{font-size:14px}
}
/* Mobile: tighten tracking and keep the launch date comfortably on the card */
@media (max-width:700px){
  h1,h2,h3,h4,h5,h6{letter-spacing:.03em;line-height:1.16}
  .launch-card .lc-date{font-size:clamp(1.5rem,8vw,2rem);letter-spacing:.02em}
  body{font-size:15.5px}
}
</style>
</head>

var ORIGINAL_DATA = [

  {id:"ph11",phase:1,name:"Contact Page: Development",description:"",assignee:"Lindsay",days:5,after:[],startOverride:"2026-09-07",type:"task"},

  {id:"ph13",phase:1,name:"Cart & Checkout: Wireframe & High-Fidelity",description:"",assignee:"Lindsay",days:10,after:[],startOverride:"2026-09-21",type:"task"},
  {id:"ph14",phase:1,name:"Video Editing & Finalizing",description:"",assignee:"Lindsay",days:20,after:[],startOverride:"2026-09-21",type:"task"},

];

var PHASE_NAMES = {1:"",2:"",3:"Key Deadlines",4:"The House",5:"Post-Launch"};

/* ============ STATE ============ */
var STORE_KEY = "ss_shopify_timeline_v12";
var state = load();
function freshState(){
  return {start: ORIGINAL_START, tasks: JSON.parse(JSON.stringify(ORIGINAL_DATA))};
}
function load(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(!raw) return freshState();
    var s = JSON.parse(raw);
    if(!s.tasks || !s.start) return freshState();
    return s;
  }catch(e){return freshState();}
}
/* Everything typed or uploaded here (comments, review files, links, edits) is written to
   localStorage immediately, so it survives closing the tab. A failed write is never silent:
   the caller rolls the change back and the person is told, rather than losing it on reload. */
var saveWarned=false;
function save(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    saveWarned=false;
    return true;
  }catch(e){
    if(!saveWarned){
      saveWarned=true;
      alert("This browser's storage is full, so that change could not be saved and would be lost when you close the page.\n\nUploaded files take the most room — remove one from \"For review\" and try again.");
    }
    return false;
  }
}
/* Assignee picks live in their own stable key so they persist across data changes / STORE_KEY bumps / file reverts. */
var SAVED_ASSIGNEES = (function(){
  try{ var raw=localStorage.getItem("ss_assignees_v2"); if(raw){ var o=JSON.parse(raw); if(o&&typeof o==="object") return o; } }catch(e){}
  return {};
})();
function saveAssigneeMap(){ try{ localStorage.setItem("ss_assignees_v2", JSON.stringify(SAVED_ASSIGNEES)); }catch(e){} }
function setAssignee(t, value){ t.assignee=value; SAVED_ASSIGNEES[t.id]=value; saveAssigneeMap(); save(); }
function applySavedAssignees(){ state.tasks.forEach(function(t){ if(Object.prototype.hasOwnProperty.call(SAVED_ASSIGNEES,t.id)) t.assignee=SAVED_ASSIGNEES[t.id]; }); }

/* ============ DATE ENGINE ============ */
function parseISO(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function toISO(d){var m=d.getMonth()+1,day=d.getDate();return d.getFullYear()+"-"+(m<10?"0":"")+m+"-"+(day<10?"0":"")+day;}
function addBusinessDays(date,n){
  var d=new Date(date.getFullYear(),date.getMonth(),date.getDate());
  var step=n>=0?1:-1, rem=Math.abs(n);
  while(rem>0){d.setDate(d.getDate()+step);var g=d.getDay();if(g!==0&&g!==6)rem--;}
  return d;
}
var byId={}, memoStart={}, memoEnd={};
function reindex(){byId={};state.tasks.forEach(function(t){byId[t.id]=t;});clearMemo();}
function clearMemo(){memoStart={};memoEnd={};}
function chainStart(t){
  if(!t.after || t.after.length===0){ return parseISO(state.start); }
  var mx=null;
  t.after.forEach(function(id){var p=byId[id];if(!p)return;var e=taskEnd(p);if(!mx||e>mx)mx=e;});
  return mx ? addBusinessDays(mx,1) : parseISO(state.start);
}
function taskStart(t){
  if(memoStart[t.id]) return memoStart[t.id];
  var r;
  if(t.fixedDate) r=parseISO(t.fixedDate);
  else if(t.startOverride) r=parseISO(t.startOverride);
  else r=chainStart(t);
  return memoStart[t.id]=r;
}
function taskEnd(t){
  if(memoEnd[t.id]) return memoEnd[t.id];
  if(t.fixedDate) return memoEnd[t.id]=parseISO(t.fixedDate);
  return memoEnd[t.id]=addBusinessDays(taskStart(t),t.days-1);
}

/* ============ CHECK-INS (fixed Thursdays, nothing depends on them) ============ */
var CHECKIN_DATA = [];  // check-ins cleared: timeline now driven solely by the Notion Project Timeline phases
function buildCheckins(){
  return CHECKIN_DATA.map(function(c,i){
    var focus=c.n.replace(/^CHECK-IN:\s*/,"");
    return {id:"checkin-"+i,checkin:true,type:"checkin",name:c.n,description:"Standing project check-in at 11am. Focus: "+focus+".",assignee:"Full team",fixedDate:c.d,phase:0};
  });
}
var CHECKINS = buildCheckins();

/* map a task to its bar-color class (drives all views) */
function typeClass(t){
  if(t.milestone) return "milestone";
  if(t.type==="checkin") return "checkin";
  if(t.type==="hard-date") return "harddate";
  if(t.type==="client-task") return "clienttask";
  return "buildtask";
}
/* assignee -> color. Bars (buildtask) and the row assignee input tint to the assignee's color. */
var ASSIGNEE_COLORS = { "Matt":"#FFCCB2", "Angel":"#D8DBFF", "Lindsay":"#E1DDD4", "Morgan":"#DBFFED" };
var DEFAULT_BAR_COLOR = "#E1DDD4";
function assigneeColor(assignee, dflt){
  var names=(assignee||"").split("/").map(function(x){ return x.trim(); }).filter(Boolean);
  if(names.length>1) return "#FFDBDC"; // more than one assignee
  for(var i=0;i<names.length;i++){ if(ASSIGNEE_COLORS[names[i]]) return ASSIGNEE_COLORS[names[i]]; }
  return dflt || DEFAULT_BAR_COLOR;
}
function barBg(kind, assignee){ return kind==="buildtask" ? ";background:"+assigneeColor(assignee) : ""; }
/* all renderable items = tasks + checkins, each with start/end date objects */
function allItems(){
  var items = state.tasks.map(function(t){
    return {t:t, start:taskStart(t), end:taskEnd(t), kind: typeClass(t)};
  });
  CHECKINS.forEach(function(c){
    items.push({t:c, start:parseISO(c.fixedDate), end:parseISO(c.fixedDate), kind:"checkin"});
  });
  return items;
}

/* ============ RENDER: MONTH ============ */
function buildMonthWeeks(year,month){
  // weeks of five weekdays (Mon-Fri) covering the month; weekends excluded
  var start=new Date(year,month,1);
  var dow=start.getDay();               // 0 Sun .. 6 Sat
  var offsetToMon=(dow===0)?-6:(1-dow); // step back to the Monday on/before the 1st
  start.setDate(start.getDate()+offsetToMon);
  var lastOfMonth=new Date(year,month+1,0);
  var weeks=[], cur=new Date(start);
  while(cur<=lastOfMonth){
    var week=[];
    for(var i=0;i<5;i++){week.push(new Date(cur));cur.setDate(cur.getDate()+1);}
    cur.setDate(cur.getDate()+2); // skip Sat + Sun to the next Monday
    weeks.push(week);
  }
  return weeks;
}
function assignLanes(items){
  // items:{colStart,colEnd,...}; greedy lanes
  var lanes=[];
  items.sort(function(a,b){return a.colStart-b.colStart || a.colEnd-b.colEnd;});
  items.forEach(function(it){
    var placed=false;
    for(var L=0;L<lanes.length;L++){
      var ok=true;
      for(var j=0;j<lanes[L].length;j++){
        var o=lanes[L][j];
        if(!(it.colStart>o.colEnd || it.colEnd<o.colStart)){ok=false;break;}
      }
      if(ok){lanes[L].push(it);it.lane=L;placed=true;break;}
    }
    if(!placed){it.lane=lanes.length;lanes.push([it]);}
  });
  return lanes.length;
}
function renderMonth(){
  var year=cursor.getFullYear(), month=cursor.getMonth();
  document.getElementById("periodTitle").textContent = MONFULL[month]+" "+year;
  var items=allItems();
  var today=new Date();

  if(isMobile.matches){ renderAgenda(year,month,items); return; }

  var weeks=buildMonthWeeks(year,month);
  var html='<div class="calendar desktop-cal"><div class="dow">';
  WEEKDAYS.forEach(function(d){html+="<div>"+d+"</div>";});
  html+='</div><div class="month-grid">';

  weeks.forEach(function(week){
    var wStart=week[0], wEnd=week[4];
    // bars for items overlapping this week
    var wItems=[];
    items.forEach(function(it){
      if(it.end<wStart || it.start>wEnd) return;
      var cs=Math.max(0, dayDiff(wStart, it.start));
      var ce=Math.min(4, dayDiff(wStart, it.end));
      if(cs<0)cs=0; if(ce>4)ce=4;
      wItems.push({it:it,colStart:cs,colEnd:ce,
        continL: it.start<wStart, continR: it.end>wEnd});
    });
    if(wItems.length===0) return; // skip weeks that have no items (e.g. the empty lead-in weeks of July)
    // dates row
    html+='<div class="week-row"><div class="week-dates">';
    week.forEach(function(d){
      var cls="daycell";
      if(d.getMonth()!==month) cls+=" other";
      if(sameDay(d,today)) cls+=" today";
      html+='<div class="'+cls+'"><span class="dnum">'+d.getDate()+'</span></div>';
    });
    html+='</div>';
    var laneCount=assignLanes(wItems);
    html+='<div class="week-bars" style="grid-template-rows:repeat('+Math.max(1,laneCount)+',auto)">';
    wItems.forEach(function(w){
      var it=w.it, t=it.t;
      var cls="bar "+it.kind;
      if(w.continL) cls+=" contin-l";
      if(w.continR) cls+=" contin-r";
      var label = it.kind==="checkin" ? "Check-In" : t.name;
      html+='<div class="'+cls+'" style="grid-column:'+(w.colStart+1)+'/'+(w.colEnd+2)+';grid-row:'+(w.lane+1)+barBg(it.kind,t.assignee)+'" '+
            'data-id="'+t.id+'" title="'+esc(t.name)+' · '+esc(t.assignee)+'">'+esc(label)+'</div>';
    });
    html+='</div></div>';
  });
  html+='</div></div>';
  document.getElementById("calArea").innerHTML=html;
  bindBars();
}
function renderAgenda(year,month,items){
  var mStart=new Date(year,month,1), mEnd=new Date(year,month+1,0);
  var today=new Date();
  // collect active days
  var map={};
  items.forEach(function(it){
    var s=it.start<mStart?mStart:it.start;
    var e=it.end>mEnd?mEnd:it.end;
    if(it.start>mEnd||it.end<mStart) return;
    // only mark the start day for multi-day, but list each day it is active? Use start day marker + span note
    var key=toISO(it.start<mStart?mStart:it.start);
    (map[key]=map[key]||[]).push(it);
  });
  var keys=Object.keys(map).sort();
  var html='<div class="calendar"><div class="agenda">';
  if(keys.length===0){ html+='<p style="padding:14px;color:var(--light800)">Nothing scheduled to begin this month.</p>'; }
  keys.forEach(function(k){
    var d=parseISO(k);
    html+='<div class="agenda-day"><div class="agenda-date"><span class="ad-day">'+d.getDate()+'</span>'+DOW[d.getDay()]+'</div><div class="agenda-items">';
    map[k].forEach(function(it){
      var t=it.t, cls="bar "+it.kind;
      var label=t.name;
      var span = (it.kind==="buildtask"||it.kind==="clienttask") ? ' <span style="opacity:.7">('+fmtShort(it.start)+' – '+fmtShort(it.end)+')</span>' : '';
      html+='<div class="'+cls+'" style="height:auto;line-height:1.4;padding:5px 9px;white-space:normal'+barBg(it.kind,t.assignee)+'" data-id="'+t.id+'">'+esc(label)+span+'</div>';
    });
    html+='</div></div>';
  });
  html+='</div></div>';
  document.getElementById("calArea").innerHTML=html;
  bindBars();
}

/* ============ RENDER: WEEK ============ */
function renderWeek(){
  var wStart=new Date(cursor);
  var dw=wStart.getDay();                 // 0 Sun .. 6 Sat
  var off=(dw===0)?-6:(1-dw);             // step back to Monday
  wStart.setDate(wStart.getDate()+off);
  var days=[];for(var i=0;i<5;i++){var d=new Date(wStart);d.setDate(d.getDate()+i);days.push(d);}
  var wEnd=days[4];
  document.getElementById("periodTitle").textContent = fmtShort(days[0])+" – "+fmtShort(wEnd)+", "+wEnd.getFullYear();
  var items=allItems();
  var today=new Date();
  var html='<div class="calendar"><div class="week-view">';
  days.forEach(function(d){
    var isWk=(d.getDay()===0||d.getDay()===6);
    html+='<div class="wv-col'+(isWk?' weekend':'')+'">';
    html+='<div class="wv-head'+(sameDay(d,today)?' today':'')+'"><div class="d1">'+DOW[d.getDay()]+'</div><div class="d2">'+d.getDate()+'</div></div>';
    html+='<div class="wv-body">';
    var dayItems=items.filter(function(it){return it.start<=d && it.end>=d;});
    dayItems.forEach(function(it){
      var t=it.t, cls="wv-item "+it.kind;
      var desc = (it.kind==="checkin"||!t.description) ? "" : '<div class="wi-desc">'+esc(snippet(t.description))+'</div>';
      var meta = '<div class="wi-meta">'+esc(t.assignee)+'</div>';
      html+='<div class="'+cls+'"'+(it.kind==="buildtask"?' style="background:'+assigneeColor(t.assignee)+'"':'')+' data-id="'+t.id+'"><div class="wi-name">'+esc(t.name)+'</div>'+meta+desc+'</div>';
    });
    if(dayItems.length===0) html+='<div style="font-size:11px;color:var(--light700);padding:4px 2px">&nbsp;</div>';
    html+='</div></div>';
  });
  html+='</div></div>';
  document.getElementById("calArea").innerHTML=html;
  bindBars();
}
function snippet(s){s=s||"";return s.length>90? s.slice(0,88)+"…" : s;}

/* ============ RENDER: OVERVIEW (Jul–Nov Gantt) ============ */
var OVERVIEW_MONTHS = 5; // project-start month + 4 -> Jul..Nov for a July start
function renderOverview(){
  var s0=parseISO(state.start);
  var y=s0.getFullYear(), m0=s0.getMonth();
  var rangeStart=new Date(y,m0,1);
  var rangeEnd=new Date(y,m0+OVERVIEW_MONTHS,0); // last day of the final month
  var totalDays=dayDiff(rangeStart,rangeEnd)+1;
  var y0=rangeStart.getFullYear(), y1=rangeEnd.getFullYear();
  document.getElementById("periodTitle").textContent =
    MON[rangeStart.getMonth()]+(y0!==y1?" "+y0:"")+" – "+MON[rangeEnd.getMonth()]+" "+y1;

  function factor(d){var f=dayDiff(rangeStart,d)/totalDays; return f<0?0:(f>1?1:f);}
  function offsetCalc(f){return "calc(var(--glabel) + (100% - var(--glabel)) * "+f.toFixed(5)+")";}

  var today=new Date();

  // month header cells
  var monthsHTML="";
  for(var i=0;i<OVERVIEW_MONTHS;i++){
    var dim=new Date(y,m0+i+1,0).getDate();
    monthsHTML+='<div class="gmonth" style="width:'+(dim/totalDays*100).toFixed(4)+'%">'+MON[(m0+i)%12]+(((m0+i)>=12)?" "+(y+1):"")+'</div>';
  }

  var rowsHTML="";
  for(var ph=1;ph<=5;ph++){
    var tasks=state.tasks.filter(function(t){
      if(t.phase!==ph) return false;
      var st=taskStart(t), en=taskEnd(t);
      return en>=rangeStart && st<=rangeEnd;
    });
    if(!tasks.length) continue;
    if(PHASE_NAMES[ph]) rowsHTML+='<div class="gantt-phase"><div class="gantt-label-col">'+esc(PHASE_NAMES[ph])+'</div><div class="gantt-track"></div></div>';
    tasks.forEach(function(t){
      var st=taskStart(t), en=taskEnd(t);
      var lf=factor(st), rf=factor(addBusinessDays(en,1)); // include the end day
      if(rf<=lf) rf=factor(en)+ (1/totalDays); // guard for same-day
      var leftPct=(lf*100).toFixed(4), widthPct=Math.max(0,(rf-lf)*100).toFixed(4);
      var cls="gbar "+typeClass(t);
      var title=esc(t.name)+" · "+esc(t.assignee)+" ("+fmtShort(st)+(t.days>1||t.fixedDate?" – "+fmtShort(en):"")+")";
      rowsHTML+='<div class="gantt-row">'+
        '<div class="gantt-label-col" data-id="'+t.id+'">'+esc(t.name)+'</div>'+
        '<div class="gantt-track"><div class="'+cls+'" style="left:'+leftPct+'%;width:'+widthPct+'%'+barBg(typeClass(t),t.assignee)+'" data-id="'+t.id+'" title="'+title+'"></div></div>'+
        '</div>';
    });
  }
  if(!rowsHTML) rowsHTML='<div class="gantt-empty">Nothing scheduled in this window.</div>';

  // overlays: month gridlines + today
  var overlays="";
  for(var g=1;g<OVERVIEW_MONTHS;g++){
    var bf=dayDiff(rangeStart,new Date(y,m0+g,1))/totalDays;
    overlays+='<div class="gantt-overlay" style="left:'+offsetCalc(bf)+'"></div>';
  }
  if(today>=rangeStart && today<=rangeEnd){
    overlays+='<div class="gantt-today" style="left:'+offsetCalc(factor(today))+'"></div>';
  }

  var html='<div class="calendar gantt"><div class="gantt-scroll"><div class="gantt-inner">'+
    '<div class="gantt-head"><div class="gantt-label-col">Track / Task</div><div class="gantt-track gantt-months">'+monthsHTML+'</div></div>'+
    rowsHTML+overlays+
    '</div></div></div>';
  document.getElementById("calArea").innerHTML=html;
  bindBars();
}

function commentStamp(){
  var d=new Date();
  var h=d.getHours(), mi=d.getMinutes();

  var au=document.getElementById("rcAuthor"+i), ta=document.getElementById("rcText"+i);

  if(!author){ alert("Please select your name before adding a comment."); if(au) au.focus(); return; }
  var text=(ta && ta.value || "").trim();
  if(!text){ alert("Please write a comment first."); if(ta) ta.focus(); return; }
  commentAuthor=author; try{localStorage.setItem("ss_comment_author",author);}catch(e){}
  if(!f.comments) f.comments=[];
  f.comments.push({author:author, text:text, when:commentStamp()});
  if(!save()){ f.comments.pop(); return; }
  if(ta) ta.value="";

function addReviewFile(t, input){
  var files=input.files ? Array.prototype.slice.call(input.files) : [];
  if(!files.length) return;
  var skipped=[], added=0;
  function finish(){
    input.value='';
    renderReviewFiles(t);
    renderList();
    if(skipped.length) alert('Not added:\n\n'+skipped.join('\n'));
  }
  // read one at a time so a failure part-way through leaves the rest intact
  (function next(i){
    if(i>=files.length){ finish(); return; }
    var file=files[i];
    if(file.size > 4*1048576){
      skipped.push(file.name+' — '+fmtBytes(file.size)+' (keep review files under 4 MB; they are saved in the browser)');
      next(i+1); return;
    }
    var reader=new FileReader();
    reader.onload=function(){
      if(!t.reviewFiles) t.reviewFiles=[];
      t.reviewFiles.push({name:file.name, size:file.size, type:file.type, data:reader.result, when:commentStamp()});
      if(!save()){
        t.reviewFiles.pop();
        skipped.push(file.name+' — not saved, this browser\'s storage is full');
        finish(); return;   // stop: everything after this would fail too
      }
      added++;
      next(i+1);
    };
    reader.onerror=function(){ skipped.push(file.name+' — could not be read'); next(i+1); };
    reader.readAsDataURL(file);
  })(0);
}

/* Phases added to ORIGINAL_DATA after someone already has saved state get folded in here,
   in their scheduled position, without touching that person's edits, comments, or files. */
function mergeNewTasks(){
  var have={}; state.tasks.forEach(function(t){ have[t.id]=true; });
  var removed=state.removed||[], added=0, at=0;
  ORIGINAL_DATA.forEach(function(o){
    if(have[o.id]){
      for(var i=0;i<state.tasks.length;i++){ if(state.tasks[i].id===o.id){ at=i+1; break; } }
      return;
    }
    if(removed.indexOf(o.id)!==-1) return;   // deliberately deleted, leave it out
    state.tasks.splice(at,0,JSON.parse(JSON.stringify(o)));
    at++; added++;
  });
  if(added) save();
}
mergeNewTasks();
reindexIfNeeded();
applySavedAssignees();
rerender();
</script>
</body>
</html>
