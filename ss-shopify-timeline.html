  line-height:1.6;
  color:var(--light600);
  background:var(--pri950);
  -webkit-font-smoothing:antialiased;
  padding-bottom:80px;
}
h1,h2,h3,h4{font-family:var(--display);color:var(--light500);font-weight:500;line-height:1.1}
.serif-italic{font-family:var(--display);font-style:italic;color:var(--acc400);font-weight:400}

/* ============ BUTTONS ============ */
button{font-family:var(--body);cursor:pointer;border:none;background:none}
.btn{
  font-family:var(--body);
  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
  text-align:center;
  padding:11px 20px;
  border-radius:2px;
  transition:background .18s,color .18s,border-color .18s;
  line-height:1;
}
.btn-primary{background:var(--acc500);color:#FCFCFB}
.btn-primary:hover{background:var(--acc400)}
.btn-primary:active{background:var(--acc600)}
.btn-secondary{background:transparent;color:var(--light500);border:1px solid var(--light500)}
.btn-secondary:hover{color:var(--light700);border-color:var(--light700)}
.btn-secondary:active{color:var(--acc400);border-color:var(--acc400)}

/* ============ LAYOUT ============ */
.wrap{max-width:1440px;margin:0 auto;padding:0 32px}

header.top{border-bottom:1px solid var(--pri700);background:var(--pri900)}
.top-inner{padding:34px 0 30px}
.top h1{font-size:var(--fs-title);letter-spacing:.01em;margin-bottom:6px}
.brand-logo{height:clamp(84px,9vw,124px);width:auto;max-width:100%;display:block;margin-bottom:10px}
.top .subtitle{font-family:var(--display);font-style:italic;color:var(--acc400);font-size:var(--fs-accent);margin-bottom:26px}

.control-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:28px}
.field label{display:block;font-size:12px;letter-spacing:.14em;color:var(--light700);margin-bottom:8px}
.field input[type=date]{
  font-family:var(--body);font-size:15px;color:var(--light500);
  background:var(--pri800);border:1px solid var(--pri700);border-radius:2px;
  padding:10px 12px;color-scheme:dark;
}
.launch-card{margin-left:auto;text-align:right}
.launch-card .lbl{font-size:12px;letter-spacing:.14em;color:var(--light700);margin-bottom:4px}
.launch-card .date{font-family:var(--display);font-weight:600;color:var(--light500);font-size:var(--fs-launch);line-height:1}
.launch-card .meta{font-size:13px;color:var(--light800);margin-top:6px}
.top-actions{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}

/* ---- view toolbar ---- */
.toolbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:22px 0}
.segmented{display:inline-flex;border:1px solid var(--pri700);border-radius:3px;overflow:hidden;background:var(--pri900)}
.segmented button{
  font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--light700);
  padding:10px 20px;background:transparent;transition:background .16s,color .16s;
}
.segmented button.active{background:var(--acc500);color:#FCFCFB}
.nav-group{display:flex;align-items:center;gap:10px}
.nav-group .period{font-family:var(--display);font-size:20px;color:var(--light500);min-width:210px;text-align:center}
.icon-btn{
  width:38px;height:38px;border:1px solid var(--pri700);border-radius:3px;color:var(--light600);
  background:var(--pri900);font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:border-color .16s,color .16s;
}
.icon-btn:hover{border-color:var(--acc400);color:var(--acc400)}
.today-btn{margin-left:4px}

/* ============ MONTH VIEW ============ */
.month-grid{border:1px solid var(--pri700);border-radius:4px;overflow:hidden;background:var(--pri900)}
.mv-weekdays{display:grid;grid-template-columns:repeat(5,1fr);background:var(--pri800)}
.mv-weekdays span{padding:10px 8px;font-size:11px;letter-spacing:.14em;color:var(--light700);text-align:left;border-right:1px solid var(--pri700)}
.mv-weekdays span:last-child{border-right:none}
.mv-week{position:relative;display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--pri700)}
.mv-day{border-right:1px solid var(--pri700);padding:6px 8px 8px}
.mv-day:last-child{border-right:none}
.mv-day.om .mv-num{color:var(--light950)}
.mv-num{font-size:13px;color:var(--light700);font-variant-numeric:tabular-nums}
.mv-day.today .mv-num{background:var(--acc500);color:#FCFCFB;border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center}
.mv-bars{position:absolute;left:0;right:0;top:30px;bottom:6px;pointer-events:none}
.bar{
  position:absolute;height:20px;border-radius:2px;padding:0 7px;font-size:11.5px;line-height:20px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--light300);
  border-left:2px solid var(--acc500);cursor:pointer;pointer-events:auto;
}
.bar.p1{background:var(--pri700)} .bar.p2{background:var(--sec700)}
.bar.p3{background:var(--ter700)} .bar.p4{background:var(--pri600)}
.bar.p5{background:var(--sec600)} .bar.p6{background:var(--ter600)}
.bar:hover{filter:brightness(1.35)}
.bar.milestone{
  background:var(--acc500);color:#FCFCFB;border-left:none;font-weight:500;
  box-shadow:0 0 0 1px var(--acc600);
}
.bar.milestone::before{content:"\25C6";margin-right:5px;font-size:9px}
.bar.checkin{
  background:transparent;color:var(--acc400);border:1px solid var(--acc500);border-radius:20px;
  font-size:10.5px;
}

/* ============ MONTH AGENDA (mobile) ============ */
.month-agenda{display:none}
.agenda-day{border-bottom:1px solid var(--pri700);padding:14px 0}
.agenda-day .ad-date{font-family:var(--display);color:var(--light500);font-size:16px;margin-bottom:8px}
.agenda-item{display:flex;gap:10px;align-items:flex-start;padding:8px 0;cursor:pointer}
.agenda-item .tag{width:4px;align-self:stretch;border-radius:2px;min-height:34px}
.agenda-item .ai-name{color:var(--light500);font-size:14.5px}
.agenda-item .ai-sub{color:var(--light800);font-size:12.5px}

/* ============ WEEK VIEW ============ */
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.wv-col{background:var(--pri900);border:1px solid var(--pri700);border-radius:4px;min-height:220px;display:flex;flex-direction:column}
.wv-head{padding:10px 12px;border-bottom:1px solid var(--pri700)}
.wv-head .dow{font-size:11px;letter-spacing:.14em;color:var(--light700)}
.wv-head .dnum{font-family:var(--display);font-size:20px;color:var(--light500)}
.wv-col.today .wv-head{background:var(--acc500)}
.wv-col.today .wv-head .dow,.wv-col.today .wv-head .dnum{color:#FCFCFB}
.wv-body{padding:8px;display:flex;flex-direction:column;gap:7px;flex:1}
.wv-card{border-radius:3px;padding:8px 9px;border-left:2px solid var(--acc500);cursor:pointer}
.wv-card.p1{background:var(--pri700)} .wv-card.p2{background:var(--sec700)}
.wv-card.p3{background:var(--ter700)} .wv-card.p4{background:var(--pri600)}
.wv-card.p5{background:var(--sec600)} .wv-card.p6{background:var(--ter600)}
.wv-card:hover{filter:brightness(1.3)}
.wv-card .c-name{font-size:12.5px;color:var(--light300);line-height:1.3;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.wv-card .c-assignee{font-size:11px;color:var(--light700);margin-top:3px}
.wv-card .c-desc{font-size:11px;color:var(--light800);margin-top:5px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.wv-card.cont{opacity:.62}
.wv-card.milestone{background:var(--acc500);border-left:none}
.wv-card.milestone .c-name{color:#FCFCFB;font-family:var(--display)}
.wv-card.checkin{background:transparent;border:1px solid var(--acc500);border-left:1px solid var(--acc500)}
.wv-card.checkin .c-name{color:var(--acc400)}
.wv-empty{color:var(--light950);font-size:11px;padding:6px 2px}

/* ============ LIST VIEW ============ */
.list-section{margin-top:44px}
.list-section > h2{font-size:var(--fs-h2);margin-bottom:4px}
.list-section > .ls-sub{font-family:var(--display);font-style:italic;color:var(--acc400);margin-bottom:20px;font-size:18px}
.phase-group{border:1px solid var(--pri700);border-radius:4px;margin-bottom:14px;overflow:hidden;background:var(--pri900)}
.pg-head{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;background:var(--pri800)}
.pg-head .chev{color:var(--light700);transition:transform .2s;font-size:12px}
.phase-group.open .pg-head .chev{transform:rotate(90deg)}
.pg-swatch{width:14px;height:14px;border-radius:2px;border-left:2px solid var(--acc500)}
.pg-swatch.p1{background:var(--pri700)} .pg-swatch.p2{background:var(--sec700)}
.pg-swatch.p3{background:var(--ter700)} .pg-swatch.p4{background:var(--pri600)}
.pg-swatch.p5{background:var(--sec600)} .pg-swatch.p6{background:var(--ter600)}
.pg-head .pg-name{font-family:var(--display);color:var(--light500);font-size:var(--fs-phase);font-weight:600;letter-spacing:.03em}
.pg-head .pg-range{margin-left:auto;font-size:12.5px;color:var(--light700);font-variant-numeric:tabular-nums}
.pg-body{display:none}
.phase-group.open .pg-body{display:block}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-weight:300;color:var(--light700);font-size:11px;letter-spacing:.12em;padding:10px 14px;border-bottom:1px solid var(--pri700)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--pri800);color:var(--light600);vertical-align:top}
.tbl tr{cursor:pointer;transition:background .14s}
.tbl tbody tr:hover{background:var(--pri800)}
.tbl tr:last-child td{border-bottom:none}
.tbl .c-phase{color:var(--light500);min-width:150px}
.tbl .c-phase .ms-dot{color:var(--acc500);margin-right:6px}
.tbl .c-detail{color:var(--light700);max-width:420px}
.tbl .c-assignee{color:var(--light600);white-space:nowrap}
.tbl .c-date{white-space:nowrap;font-variant-numeric:tabular-nums;color:var(--light600)}
.tbl .c-dur{white-space:nowrap;color:var(--light700);text-align:right}
.ms-row td{background:rgba(154,79,42,.09)}

/* ============ EDIT DRAWER ============ */
.scrim{position:fixed;inset:0;background:rgba(4,5,16,.6);opacity:0;visibility:hidden;transition:opacity .22s;z-index:90}
.scrim.show{opacity:1;visibility:visible}
.drawer{
  position:fixed;top:0;right:0;height:100vh;width:400px;max-width:92vw;background:var(--pri900);
  border-left:1px solid var(--pri700);z-index:100;transform:translateX(100%);transition:transform .26s ease;
  display:flex;flex-direction:column;
}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:26px 28px 18px;border-bottom:1px solid var(--pri700)}
.drawer-head .dh-phase{font-size:12px;letter-spacing:.14em;color:var(--acc400);margin-bottom:8px}
.drawer-head h3{font-size:24px;color:var(--light500)}
.drawer-body{padding:24px 28px;overflow-y:auto;flex:1}
.drawer-body .fld{margin-bottom:20px}
.drawer-body label{display:block;font-size:12px;letter-spacing:.12em;color:var(--light700);margin-bottom:8px}
.drawer-body input,.drawer-body textarea{
  width:100%;font-family:var(--body);font-size:14px;color:var(--light400);
  background:var(--pri800);border:1px solid var(--pri700);border-radius:2px;padding:11px 12px;line-height:1.5;
}
.drawer-body input:focus,.drawer-body textarea:focus{outline:none;border-color:var(--acc500)}
.drawer-body textarea{min-height:120px;resize:vertical}
.drawer-body .computed{display:flex;gap:24px;margin-top:4px;padding:14px 0;border-top:1px solid var(--pri800)}
.drawer-body .computed .cv .k{font-size:11px;letter-spacing:.12em;color:var(--light800);margin-bottom:4px}
.drawer-body .computed .cv .v{font-family:var(--display);font-size:17px;color:var(--light500)}
.drawer-body .note{font-size:12.5px;color:var(--light800);font-style:italic;font-family:var(--display)}
.drawer-foot{padding:18px 28px;border-top:1px solid var(--pri700);display:flex;gap:12px}
.drawer-foot .btn{flex:1}

/* ============ RESPONSIVE ============ */
@media(max-width:1024px){
  .wrap{padding:0 22px}
  .week-grid{gap:7px}
  .wv-card .c-desc{-webkit-line-clamp:3}
}
@media(max-width:768px){
  body{line-height:1.7}
  .launch-card{margin-left:0;text-align:left;width:100%}
  .drawer{width:100%;max-width:100%}
  .toolbar{gap:12px}
  .nav-group .period{min-width:150px;font-size:17px}
}
@media(max-width:640px){
  .month-grid{display:none}
  .month-agenda{display:block}
  .week-grid{grid-template-columns:1fr;gap:10px}
  .wv-col{min-height:0}
  .wv-card .c-desc{-webkit-line-clamp:2}
  .drawer{inset:0;height:100vh;max-width:100%;transform:translateY(100%)}
  .drawer.show{transform:translateY(0)}
  .toolbar{flex-direction:column;align-items:stretch}
  .nav-group{justify-content:space-between}
  .nav-group .period{min-width:0;flex:1}
}
</style>

/* ================= STATE / PERSISTENCE ================= */
const LS_KEY = "ss-timeline-v2";
let STATE = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const p = JSON.parse(raw); return {start:p.start||DEFAULT_START, edits:p.edits||{}}; }
  }catch(e){}
  return {start:DEFAULT_START, edits:{}};
}
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); }catch(e){}
}
function getTasks(){
  return DEFAULT_DATA.map(function(t){
    const e = STATE.edits[t.id] || {};
    return Object.assign({}, t, {
      name: e.name!==undefined ? e.name : t.name,
      description: e.description!==undefined ? e.description : t.description,
      assignee: e.assignee!==undefined ? e.assignee : t.assignee,
      days: e.days!==undefined ? e.days : t.days
    });
  });
}

/* ================= DATE HELPERS ================= */
function D(s){ const p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
function ymd(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function addDays(dt,n){ const r=new Date(dt); r.setDate(r.getDate()+n); return r; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function dayDiff(a,b){ return Math.round((stripTime(b)-stripTime(a))/86400000); }
function stripTime(dt){ return new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()); }

/* add n business days (skips Sat/Sun) */
function addBusinessDays(dt,n){
  const r=new Date(dt); const step=n>=0?1:-1; let rem=Math.abs(n);
  while(rem>0){ r.setDate(r.getDate()+step); const d=r.getDay(); if(d!==0&&d!==6) rem--; }
  return r;
}
function rollForward(dt){ const r=new Date(dt); while(r.getDay()===0||r.getDay()===6) r.setDate(r.getDate()+1); return r; }

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_ABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DOW_ABBR=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function fmtLong(dt){ return MONTHS[dt.getMonth()]+" "+dt.getDate()+", "+dt.getFullYear(); }
function fmtShort(dt){ return MONTHS_ABBR[dt.getMonth()]+" "+dt.getDate(); }

/* ================= ENGINE ================= */
/* start(task) = after empty ? PROJECT_START : addBusinessDays(max(end(dep)),1)
   end(task)   = addBusinessDays(start, days-1)
   fixedDate overrides both. */
function computeSchedule(tasks, projStartStr){
  const projStart = rollForward(D(projStartStr));
  const map={}; tasks.forEach(function(t){ map[t.id]=t; });
  const sM={}, eM={};
  function start(t){
    if(t.id in sM) return sM[t.id];
    let r;
    if(t.fixedDate) r=D(t.fixedDate);
    else if(!t.after || t.after.length===0) r=new Date(projStart);
    else {
      let mx=null;
      t.after.forEach(function(dep){ const e=end(map[dep]); if(!mx||e>mx) mx=e; });
      r=addBusinessDays(mx,1);
    }
    return sM[t.id]=r;
  }
  function end(t){
    if(t.id in eM) return eM[t.id];
    const r = t.fixedDate ? D(t.fixedDate) : addBusinessDays(start(t), t.days-1);
    return eM[t.id]=r;
  }
  const out={};
  tasks.forEach(function(t){ out[t.id]={start:start(t), end:end(t)}; });
  return out;
}

/* ================= BI-WEEKLY CHECK-INS (generated) ================= */
function genCheckins(){
  const out=[]; let d=new Date(2026,6,23); const endD=new Date(2027,0,29); let i=0;
  while(d<=endD){
    out.push({id:"ci-"+i, kind:"checkin", name:"Bi-Weekly Check-In, 11am", start:new Date(d), end:new Date(d)});
    d=addDays(d,14); i++;
  }
  return out;
}

/* ================= BUILD RENDER ITEMS ================= */
function buildItems(){
  const tasks=getTasks();
  const sched=computeSchedule(tasks, STATE.start);
  const items=tasks.map(function(t){
    return Object.assign({}, t, {
      kind: t.milestone ? "milestone" : "task",
      start: sched[t.id].start,
      end: sched[t.id].end
    });
  });
  return {tasks:tasks, sched:sched, calItems:items.concat(genCheckins())};
}

/* ================= VIEW STATE ================= */
let VIEW="month";
let curMonth, curYear;   // month view
let weekStart;           // week view (a Sunday)

function initPeriods(){
  const s=rollForward(D(STATE.start));
  curMonth=s.getMonth(); curYear=s.getFullYear();
  weekStart=startOfWeek(s);
}
/* work week starts Monday; weekends are not shown */
function startOfWeek(dt){ const r=stripTime(dt); const day=r.getDay(); r.setDate(r.getDate()+(day===0?-6:1-day)); return r; }
const WEEKDAYS_MF=["Mon","Tue","Wed","Thu","Fri"];

/* ================= LANE LAYOUT (month) ================= */
function layoutWeek(wkStart, items){
  const wkEnd=addDays(wkStart,4);
  const vis=items.filter(function(it){ return it.end>=wkStart && it.start<=wkEnd; });
  vis.sort(function(a,b){
    const d=stripTime(a.start)-stripTime(b.start);
    if(d!==0) return d;
    return (stripTime(b.end)-stripTime(b.start))-(stripTime(a.end)-stripTime(a.start));
  });
  const placed=[];
  vis.forEach(function(it){
    const segStart=it.start<wkStart?wkStart:it.start;
    const segEnd=it.end>wkEnd?wkEnd:it.end;
    const startCol=dayDiff(wkStart,segStart);
    const span=dayDiff(segStart,segEnd)+1;
    let lane=0, ok=false;
    while(!ok){
      ok=!placed.some(function(p){
        return p.lane===lane && !(startCol+span-1<p.startCol || startCol>p.startCol+p.span-1);
      });
      if(!ok) lane++;
    }
    placed.push({item:it,startCol:startCol,span:span,lane:lane});
  });
  return placed;
}

/* ================= RENDER: MONTH GRID ================= */
function renderMonth(){
  const items=CURRENT.calItems;
  const today=stripTime(new Date());
  const first=new Date(curYear,curMonth,1);
  const gridStart=startOfWeek(first);
  const grid=document.getElementById("monthGrid");
  let html='<div class="mv-weekdays">'+WEEKDAYS_MF.map(function(d){return "<span>"+d+"</span>";}).join("")+'</div>';

  for(let w=0; w<6; w++){
    const wkStart=addDays(gridStart, w*7);
    // stop drawing empty trailing weeks that are outside the month
    if(w>=4 && wkStart.getMonth()!==curMonth && addDays(wkStart,4).getMonth()!==curMonth) break;
    const placed=layoutWeek(wkStart, items);
    let lanes=0; placed.forEach(function(p){ if(p.lane+1>lanes) lanes=p.lane+1; });
    const bandH=lanes*24;
    const weekMinH=32+bandH+6;

    let days="";
    for(let i=0;i<5;i++){
      const dd=addDays(wkStart,i);
      const om = dd.getMonth()!==curMonth ? " om":"";
      const td = sameDay(dd,today) ? " today":"";
      days+='<div class="mv-day'+om+td+'"><span class="mv-num">'+dd.getDate()+'</span></div>';
    }
    let bars="";
    placed.forEach(function(p){
      const it=p.item;
      const left=(p.startCol/5*100);
      const width=(p.span/5*100);
      const top=p.lane*24;
      const cls = it.kind==="milestone" ? "bar milestone" : (it.kind==="checkin" ? "bar checkin" : "bar p"+it.phase);
      const editable = it.kind==="checkin" ? "" : ' data-id="'+it.id+'"';
      const label = escapeHtml(it.name);
      bars+='<div class="'+cls+'" style="left:'+left+'%;width:'+width+'%;top:'+top+'px"'+editable+' title="'+label+'">'+label+'</div>';
    });
    html+='<div class="mv-week" style="min-height:'+weekMinH+'px">'+days+'<div class="mv-bars">'+bars+'</div></div>';
  }
  grid.innerHTML=html;
  bindBars(grid);
  renderAgenda();
}

/* ================= RENDER: MONTH AGENDA (mobile) ================= */
function renderAgenda(){
  const items=CURRENT.calItems.filter(function(it){
    return it.end.getMonth()===curMonth&&it.end.getFullYear()===curYear
        || it.start.getMonth()===curMonth&&it.start.getFullYear()===curYear
        || (it.start< new Date(curYear,curMonth,1) && it.end> new Date(curYear,curMonth+1,0));
  });
  // group by start day within the month window
  const monthStart=new Date(curYear,curMonth,1), monthEnd=new Date(curYear,curMonth+1,0);
  const byDay={};
  items.forEach(function(it){
    let key = it.start< monthStart ? ymd(monthStart) : ymd(it.start);
    const kd=D(key).getDay();
    if(kd===0||kd===6) return; // weekends are not shown
    (byDay[key]=byDay[key]||[]).push(it);
  });
  const keys=Object.keys(byDay).sort();
  const el=document.getElementById("monthAgenda");
  if(!keys.length){ el.innerHTML='<div class="wv-empty">Nothing scheduled this month.</div>'; return; }
  let html="";
  keys.forEach(function(k){
    const dt=D(k);
    html+='<div class="agenda-day"><div class="ad-date">'+DOW_ABBR[dt.getDay()]+" "+fmtLong(dt)+'</div>';
    byDay[k].forEach(function(it){
      const color = it.kind==="milestone"?"var(--acc500)":(it.kind==="checkin"?"transparent":phaseVar(it.phase));
      const bd = it.kind==="checkin"?"border:1px solid var(--acc500);":"";
      const editable = it.kind==="checkin" ? "" : ' data-id="'+it.id+'"';
      const sub = it.kind==="checkin" ? "11am" : (it.kind==="milestone"?"Milestone":"Assignee: "+escapeHtml(it.assignee||""))+"  ·  "+fmtShort(it.start)+" to "+fmtShort(it.end);
      html+='<div class="agenda-item"'+editable+'><span class="tag" style="background:'+color+";"+bd+'"></span><div><div class="ai-name">'+escapeHtml(it.name)+'</div><div class="ai-sub">'+sub+'</div></div></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
  bindBars(el);
}

/* ================= RENDER: WEEK ================= */
function renderWeek(){
  const items=CURRENT.calItems;
  const today=stripTime(new Date());
  const grid=document.getElementById("weekGrid");
  let html="";
  for(let i=0;i<5;i++){
    const dd=addDays(weekStart,i);
    const td=sameDay(dd,today)?" today":"";
    const active=items.filter(function(it){ return stripTime(it.start)<=dd && dd<=stripTime(it.end); });
    active.sort(function(a,b){ return (a.kind==="milestone"?-1:0)-(b.kind==="milestone"?-1:0); });
    let cards="";
    if(!active.length){ cards='<div class="wv-empty">&mdash;</div>'; }
    active.forEach(function(it){
      const isStart=sameDay(stripTime(it.start),dd);
      if(it.kind==="milestone"){
        cards+='<div class="wv-card milestone" data-id="'+it.id+'"><div class="c-name">◆ '+escapeHtml(it.name)+'</div></div>';
      }else if(it.kind==="checkin"){
        cards+='<div class="wv-card checkin"><div class="c-name">'+escapeHtml(it.name)+'</div></div>';
      }else{
        const cont = isStart ? "" : " cont";
        const desc = isStart ? '<div class="c-desc">'+escapeHtml(it.description)+'</div>' : '<div class="c-assignee">continues</div>';
        cards+='<div class="wv-card p'+it.phase+cont+'" data-id="'+it.id+'"><div class="c-name">'+escapeHtml(it.name)+'</div><div class="c-assignee">'+escapeHtml(it.assignee)+'</div>'+desc+'</div>';
      }
    });
    html+='<div class="wv-col'+td+'"><div class="wv-head"><div class="dow">'+DOW_ABBR[dd.getDay()]+'</div><div class="dnum">'+dd.getDate()+'</div></div><div class="wv-body">'+cards+'</div></div>';
  }
  grid.innerHTML=html;
  bindBars(grid);
}

/* ================= HELPERS ================= */
function phaseVar(ph){ return {1:"var(--pri700)",2:"var(--sec700)",3:"var(--ter700)",4:"var(--pri600)",5:"var(--sec600)",6:"var(--ter600)"}[ph]; }
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function bindBars(scope){
  scope.querySelectorAll("[data-id]").forEach(function(b){
    b.addEventListener("click",function(ev){ ev.stopPropagation(); openEditor(b.getAttribute("data-id")); });
  });
}

/* ================= EDITOR ================= */
let editingId=null;
function openEditor(id){
  const t=CURRENT.tasks.filter(function(x){return x.id===id;})[0];
  if(!t) return;
  editingId=id;
  document.getElementById("edPhase").textContent="Phase "+t.phase+", "+PHASES[t.phase].name;
  document.getElementById("edHeading").textContent=t.milestone?"Milestone":"Edit sub-phase";
  document.getElementById("edName").value=t.name;
  document.getElementById("edDesc").value=t.description;
  document.getElementById("edAssignee").value=t.assignee;
  const daysInput=document.getElementById("edDays");
  daysInput.value=t.days;
  const note=document.getElementById("edNote");
  if(t.fixedDate){
    daysInput.disabled=true;
    note.style.display="block";
    note.textContent="This event has a fixed calendar date ("+fmtLong(D(t.fixedDate))+") and ignores the dependency chain.";
  }else{
    daysInput.disabled=false;
    note.style.display="none";
  }
  refreshEditorComputed();
  document.getElementById("scrim").classList.add("show");
  document.getElementById("drawer").classList.add("show");
}
function refreshEditorComputed(){
  // preview with current field values without committing
  const t=CURRENT.tasks.filter(function(x){return x.id===editingId;})[0];
  const days=parseInt(document.getElementById("edDays").value,10);
  const previewTasks=getTasks().map(function(x){
    if(x.id===editingId && !x.fixedDate && days>0) return Object.assign({},x,{days:days});
    return x;
  });
  const sched=computeSchedule(previewTasks, STATE.start);
  document.getElementById("edStart").textContent=fmtShort(sched[editingId].start);
  document.getElementById("edEnd").textContent=fmtShort(sched[editingId].end);
}
function closeEditor(){
  editingId=null;
  document.getElementById("scrim").classList.remove("show");
  document.getElementById("drawer").classList.remove("show");
}
function saveEditor(){
  if(!editingId) return;
  const base=DEFAULT_DATA.filter(function(x){return x.id===editingId;})[0];
  const name=document.getElementById("edName").value;
  const description=document.getElementById("edDesc").value;
  const assignee=document.getElementById("edAssignee").value;
  let days=parseInt(document.getElementById("edDays").value,10);
  if(isNaN(days)||days<1) days=base.days;
  const e={};
  if(name!==base.name) e.name=name;
  if(description!==base.description) e.description=description;
  if(assignee!==base.assignee) e.assignee=assignee;
  if(!base.fixedDate && days!==base.days) e.days=days;
  if(Object.keys(e).length) STATE.edits[editingId]=e; else delete STATE.edits[editingId];
  saveState();
  closeEditor();
  rebuildAndRender();
}

  const el=document.getElementById("periodLabel");
  if(VIEW==="month"){ el.textContent=MONTHS[curMonth]+" "+curYear; }
  else{ const we=addDays(weekStart,4); el.textContent=fmtShort(weekStart)+" – "+fmtShort(we)+", "+we.getFullYear(); }
}
function nav(dir){
  if(VIEW==="month"){
    curMonth+=dir;
    if(curMonth<0){curMonth=11;curYear--;} if(curMonth>11){curMonth=0;curYear++;}
    renderMonth();
  }else{
    weekStart=addDays(weekStart,7*dir);
    renderWeek();
  }
  updatePeriodLabel();
}
function goToday(){
  const t=new Date();
  if(VIEW==="month"){ curMonth=t.getMonth(); curYear=t.getFullYear(); renderMonth(); }
  else{ weekStart=startOfWeek(t); renderWeek(); }
  updatePeriodLabel();
}

  document.getElementById("segWeek").classList.toggle("active",v==="week");
  document.getElementById("monthView").style.display=v==="month"?"block":"none";
  document.getElementById("weekView").style.display=v==="week"?"block":"none";
  if(v==="month") renderMonth(); else renderWeek();
  updatePeriodLabel();
}

/* ================= LAUNCH DISPLAY ================= */
function renderLaunch(){
  const live=CURRENT.sched["p5-live"];
  document.getElementById("launchDate").textContent=fmtLong(live.end);
  const p2=CURRENT.sched["p6-live"];
  document.getElementById("launchMeta").textContent="Phase 1 build. The Journal & The Society goes live "+fmtLong(p2.end)+".";
}

/* ================= MASTER ================= */
let CURRENT=null;
function rebuildAndRender(){
  CURRENT=buildItems();
  renderLaunch();
  if(VIEW==="month") renderMonth(); else renderWeek();
  renderList();
  updatePeriodLabel();
}

/* ================= WIRE UP ================= */
document.getElementById("startDate").value=STATE.start;
initPeriods();
CURRENT=buildItems();
rebuildAndRender();

document.getElementById("startDate").addEventListener("change",function(e){
  if(!e.target.value) return;
  STATE.start=e.target.value; saveState();
  initPeriods(); rebuildAndRender();
});
document.getElementById("resetBtn").addEventListener("click",function(){
  STATE={start:DEFAULT_START, edits:{}}; saveState();
  document.getElementById("startDate").value=DEFAULT_START;
  openPhases={}; initPeriods(); rebuildAndRender();
});
document.getElementById("segMonth").addEventListener("click",function(){ setView("month"); });
document.getElementById("segWeek").addEventListener("click",function(){ setView("week"); });
document.getElementById("prevBtn").addEventListener("click",function(){ nav(-1); });
document.getElementById("nextBtn").addEventListener("click",function(){ nav(1); });
document.getElementById("todayBtn").addEventListener("click",goToday);
document.getElementById("edCancel").addEventListener("click",closeEditor);
document.getElementById("edSave").addEventListener("click",saveEditor);
document.getElementById("scrim").addEventListener("click",closeEditor);
document.getElementById("edDays").addEventListener("input",refreshEditorComputed);
document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeEditor(); });

// open Phase 1 by default in the list
openPhases[1]=true;
renderList();
</script>
</body>
</html>
