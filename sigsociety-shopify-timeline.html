<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Signature Society, Shopify Website Development Timeline</title>
<style>
  html,body{margin:0;padding:0;background:#040510;/* --pri950 */}
  #frame{display:block;width:100%;border:0;min-height:100vh;background:#040510}
  #cover{
    position:fixed;inset:0;background:#040510;display:flex;align-items:center;justify-content:center;
    color:#9E9A94;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;
    letter-spacing:.16em;transition:opacity .4s;z-index:10;
  }
  #cover.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
  <div id="cover">LOADING TIMELINE</div>
  <!--
    Client preview. This is a read-only window onto ss-shopify-timeline.html.
    It embeds that file directly, so any edit to the source (data, durations,
    colors, layout, logic) is reflected here automatically on next load.
    The controls Lindsay uses (start date, reset, editing) are hidden below.
  -->
  <iframe id="frame" src="ss-shopify-timeline.html" title="Signature Society Shopify Website Development Timeline" scrolling="no"></iframe>

<script>
"use strict";
(function(){
  var f=document.getElementById("frame");
  var cover=document.getElementById("cover");

  function injectClientView(){
    var doc, win;
    try{ doc=f.contentDocument; win=f.contentWindow; }catch(e){ return false; }
    if(!doc||!doc.head) return false;

    // 1. Hide the owner-only controls and the edit drawer. Keep viewing controls
    //    (month/week toggle, navigation, list collapse) so the client can see
    //    exactly what the owner sees in both the month and week views.
    if(!doc.getElementById("client-view-css")){
      var st=doc.createElement("style");
      st.id="client-view-css";
      st.textContent=
        ".top-inner .field{display:none !important}"+
        ".top-actions{display:none !important}"+
        ".scrim,.drawer{display:none !important}"+
        "[data-id]{cursor:default !important}"+
        ".bar:hover{filter:none !important}"+
        ".wv-card:hover{filter:none !important}"+
        ".tbl tbody tr:hover{background:transparent !important}";
      doc.head.appendChild(st);
    }

    // 2. Neutralize the editor so clicking a phase or a list row does nothing.
    try{ win.openEditor=function(){}; }catch(e){}

    // 3. Reword the list helper so it does not imply the client can edit.
    var sub=doc.querySelector(".list-section .ls-sub");
    if(sub) sub.textContent="Full phase and task schedule.";

    sizeFrame();
    return true;
  }

  function sizeFrame(){
    try{
      var doc=f.contentDocument;
      if(!doc||!doc.body) return;
      var h=Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight);
      if(h>0) f.style.height=h+"px";
    }catch(e){}
  }

  f.addEventListener("load", function(){
    var ok=injectClientView();
    if(!ok){
      // Same-origin access failed (for example when opened via file:// instead
      // of a served URL). Show a hint instead of a broken preview.
      cover.textContent="OPEN THIS PREVIEW FROM ITS PUBLISHED LINK";
      return;
    }
    cover.classList.add("hide");

    // Keep the frame sized to its content as the client toggles views or
    // navigates months.
    try{
      var doc=f.contentDocument;
      if(window.ResizeObserver){
        var ro=new ResizeObserver(function(){ sizeFrame(); });
        ro.observe(doc.documentElement);
      }
      doc.addEventListener("click", function(){ setTimeout(sizeFrame,60); }, true);
    }catch(e){}

    var n=0, iv=setInterval(function(){ sizeFrame(); if(++n>25) clearInterval(iv); }, 250);
  });

  window.addEventListener("resize", sizeFrame);
})();
</script>
</body>
</html>
